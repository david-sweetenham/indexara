<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexara</title>
  <link rel="stylesheet" href="/web/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Indexara</h1>
      <div class="mode-toggle">
        <button id="btn-search" class="mode-btn active" data-mode="search">Search</button>
        <button id="btn-ask" class="mode-btn" data-mode="ask">Ask</button>
        <button id="btn-insights" class="mode-btn" data-mode="insights">Insights</button>
        <button id="btn-scan" class="mode-btn" data-mode="scan">Scan</button>
        <button id="btn-audio" class="mode-btn" data-mode="audio">Audio</button>
      </div>
    </div>
  </header>

  <main>
    <div class="search-container">
      <form id="search-form">
        <input
          id="query-input"
          type="text"
          placeholder="Search files... e.g. FLAC albums by Radiohead"
          autocomplete="off"
          autofocus
        >
        <button type="submit" id="submit-btn">Search</button>
      </form>
      <div id="status-bar"></div>
      <div id="quick-filters">
        <button class="qf-btn" data-query="all music files" data-mode="search">🎵 Music</button>
        <button class="qf-btn" data-query="FLAC files" data-mode="search">🎼 FLAC</button>
        <button class="qf-btn" data-query="MP3 files" data-mode="search">🎧 MP3</button>
        <button class="qf-btn" data-query="all video files" data-mode="search">🎬 Videos</button>
        <button class="qf-btn" data-query="all images" data-mode="search">🖼 Images</button>
        <button class="qf-btn" data-query="all documents" data-mode="search">📄 Documents</button>
        <button class="qf-btn" data-query="largest files over 100MB" data-mode="search">📦 Large Files</button>
        <button class="qf-btn" data-query="recently added files" data-mode="search">🕐 Recent</button>
      </div>
    </div>

    <div id="results-container">
      <div id="sort-bar" style="display:none">
        <span class="sort-label">Sort:</span>
        <button class="sort-btn active" data-sort="relevance">Relevance</button>
        <button class="sort-btn" data-sort="name">Name</button>
        <button class="sort-btn" data-sort="size-desc">Size ↓</button>
        <button class="sort-btn" data-sort="size-asc">Size ↑</button>
        <button class="sort-btn" data-sort="date-desc">Date ↓</button>
        <button class="sort-btn" data-sort="date-asc">Date ↑</button>
        <button class="sort-btn" data-sort="type">Type</button>
      </div>
      <div id="results"></div>
    </div>
  </main>

  <!-- File browser modal -->
  <div id="fb-overlay" class="fb-overlay" style="display:none" onclick="if(event.target===this)window._fbClose()">
    <div class="fb-modal">
      <div class="fb-header">
        <span class="fb-title">Browse for folder</span>
        <button class="fb-close-btn" onclick="window._fbClose()">✕</button>
      </div>
      <div id="fb-breadcrumbs" class="fb-breadcrumbs"></div>
      <div id="fb-list" class="fb-list"></div>
      <div class="fb-footer">
        <span id="fb-current-path" class="fb-current-path"></span>
        <button id="fb-select-btn" class="fb-select-btn" onclick="window._fbSelect()">Select This Folder</button>
      </div>
    </div>
  </div>

  <!-- Tag editor modal -->
  <div id="te-overlay" class="fb-overlay" style="display:none" onclick="if(event.target===this)window._teClose()">
    <div class="fb-modal" style="max-width:480px">
      <div class="fb-header">
        <span class="fb-title">Edit Audio Tags</span>
        <button class="fb-close-btn" onclick="window._teClose()">✕</button>
      </div>
      <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
        <input type="hidden" id="te-path">
        <label class="te-label">Artist
          <input id="te-artist" class="te-input" type="text" placeholder="Artist name">
        </label>
        <label class="te-label">Album
          <input id="te-album" class="te-input" type="text" placeholder="Album name">
        </label>
        <label class="te-label">Title
          <input id="te-title" class="te-input" type="text" placeholder="Track title">
        </label>
        <label class="te-label">Year
          <input id="te-year" class="te-input" type="number" placeholder="Year">
        </label>
        <div id="te-status" style="font-size:12px;min-height:16px"></div>
        <button id="te-save-btn" class="fb-select-btn" onclick="window._teSave()">Save Tags</button>
      </div>
    </div>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
